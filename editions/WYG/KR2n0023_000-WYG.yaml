body:
  text: 蘭亭續考目録類二金石之屬提要臣等謹案蘭亭續考二卷宋俞松撰松字夀翁案俞庭椿亦字夀翁二人同人謹附同在宋末而實非一人謹附識於此自署曰呉山葢錢塘人後有自跋稱甲辰書於景歐堂葢淳祐四年也其仕履無考惟髙宗臨本跋内有承議郎臣松之語其終於是官與亦莫得而詳焉是書葢繼桑世昌而作故名曰續考跋内所稱近嵗士人作蘭亭攷凡數萬言名流品題登載略盡者即指世昌之書然書中體例與世昌逈異上卷兼載松所自藏與他家藏本下卷則皆松所自藏經李心傳題跋者其跋皆淳祐元年至三年所題以宋史心傳本傳考之葢其罷祠之後寓居臨安時也前卷所載跋語知辨永嘉之誤而仍沿筆陣圗所云羲之三十三嵗書蘭亭之説其無所㫁制與世昌相等然朱彛尊曝書亭集有是書跋稱其跋語條暢不類董逌輩之晦澁則賞鑒家固亦取之至心傳題跋尤熟于史事如宋祁摹碑青社諡法諸條皆足以備考核非徒紀書畫也又宋史心傳本傳載其淳祐元年罷祠而其初入史館因言者論罷則不載其嵗月今是書跋内有紹定之季罷史職歸嵓居語則知其罷在紹定末年亦足以補史闕焉乾隆四十六年三月㳟校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c408349a36dc7339b80e42636380317837f585e4e3b4692f409ba067abc79b17
