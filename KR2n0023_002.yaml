body:
  text: 蘭亭續考卷二宋俞松撰魯氏此帖藏之百年而壽翁表出之非篤好何以至此後山隂修禊之八百六十九年中冬月上朔日蜀人李心傳觀淳祐初年題魯雲林所藏本董承旨者名誡劉信叔子壻也劉氏世為貴將則此帖由來可考矣鑱去五字所傳亦不同昔右軍既書此文甚自愛賞更書之無能及者則謂蘭亭不見稱於晉恐未為確論也摩挲墨本尚爾况其真迹耶淳祐辛丑嵗十有一月庚子哉生魄越六日乙巳秀巗老人李心傳題薑堯章所藏本紹定之季嵗豫罷史職歸嵓居春三月過禦溪沈虞卿侍郎之孫提舉君以家藏禊帖示余求識其後秋九月過梁溪尤伯晦仲晦方里居邀豫與蔣良貴共飯日加己巳速客席間設大几錦標玉軸堆積其上余雅聞遂初圖書之富也亟起觀之則多元老巨儒所嘗鑒賞者良貴拔其尤者謂豫各題數語觴每行趣輒更一二軸遲明飲畢余與良貴各題若干卷亦不憶有無禊帖在其間也闕五日俞壽翁走價以此帖示豫實沈二卿於羣玉暨史園兩嘗出似坐客者而尤公遺墨在焉其為定武真帖不疑矣前後同觀者十有六人大抵二熙名士其間蓋有出處與隆替對者自是右軍輩人物書翰其一也後之覽者又當有感於斯文陵陽李心傳書供內相所題本俞壽翁寄示禊帖四皆定本也但筆迹微有肥瘦之不同耳聞諸前輩謂此石將歸天上好事者疊紙以拓之紙在上者字微瘦理宜爾也此帖差瘦徑余一見之便覺與沈二卿家本相類視壽翁所評亦然因識其後淳祐元年冬十有一月乙巳研溪李心傳劉明達所藏本此帖嘗經思陵賞識無復可議况後有驪珠三十六耶思陵本斆黃書後以偽豫遣能黃書者為間改從右軍而紹興之初筆勢已如此乃與戒石銘字體頓異殆天縱也鄭諶寺人中之粗能詩者上雖以此帖畀之未幾屬鞬之際復以其交通士大夫而止蓋畏公議如此後百有十年承議郎臣俞松以示前史官臣李心傳因憶傳舊聞龔識其後高皇賜鄭諶本此卷不知何人所作觀其意象殆二人初相見時也或謂當作老僧蒼皇俯叩口法而不能合之狀乃為真失蘭亭耳昔政和畫學以午隂多處聽潺湲命題衆皆作清流激湍而聽者坐其側最後納卷者獨為藤蔓膠轕樹影正中而有人屬耳于崩崕亂石之間上覽之以為真聽潺湲者遂除盡學録然則摹寫之工固不在乎泥其迹毋亦對談之頃而蘭亭已落我度中耶夀翁試評之淳祐二年春正月甲午霅濱病叟書江南蕭翼取蘭亭圖豫嘗評夀翁四禊帖以瘦本為勝後見周益公之説亦然夀翁復以二帖示余亦瘦本也沂公作相時定武石似未刻豈其子孫所藏耶淳祐壬寅嵗雨水節霅濱病叟李心傳書范文正公所藏本豫既題此帖後五旬有一日夀翁復以示豫反復觀之真善本也以集古録考之當嘉祐中定武民間石刻已出但未入公廨耳然世傳薛紹彭易之以歸長安後其弟嗣昌獻諸朝今觀嗣昌大觀初題識乃以為得長安崔氏所藏本真迹而刻之則又非定本也蓋薛本幸存於靖康北狩之日而復逸於建炎南渡之時自是絶迹矣今夀翁訪求至十數帖而未見其殆有蘭亭癖耶霅濱病叟李心傳嗣書再題范文正公前本集古録所收蘭亭四刻王沂公家本才居一爾而陳沈二跋咸稱焉或疑其有一誤然沂公家自有石則摹傳宜不止此但渡江之後所存絶少滋為可愛耳虞卿鑒賞甚精兹夀翁所以為據也歐公録沂而舍定政謂其纎毫無異不必並列爾非有所輕重也淳祐壬寅嵗清明後五日蜀人李心傳觀歐陽文忠公所藏本此帖信美矣唯室以為王沂公家本蓋有所授第併指定武石刻則似未深考耳歐陽公既敘沂本而繼之云又有别本在定州民家二家各有石校其本􅊏毫無異故不復録然則二本皆佳也奚必以定本為貴哉唯室紹興名士也豫嘗得其步里客談一編今又見其三詩風流可想矣淳祐壬寅嵗季春之四日霅溪病叟書王沂公本德壽臨蘭亭世所藏者不一而垂針蟹爪之體各具真宸筆也但摸刻者視真迹為稍腴耳嘗聞普安恩平宗藩並立之時上各賜以所臨蘭亭而批其後云依此本進五百本其後重華書七百本上之而恩平訖無所進蓋勤怠之分天命之所以去留也書帖云乎哉淳祐三年修禊日承議即臣松以真迹示臣心傳龔題其後高皇御書臨寫本夀翁以三禊帖示豫其末用青社忠臣曽孫之印蓋曽威愍家所藏也威愍建炎初帥京東死國難豫聞定刻以瘦本為貴而此首帖特秀潤者歐陽文忠公評李陽冰忘歸臺等諸碑謂三石皆活嵗久漸生刻勿欲合故多細時有數字筆畫偉徑者乃真迹也然則此帖殆亦活石所刻但摹打有先後故潤瘦不同耶反復視之滋為可愛其它亦不足較也淳祐壬寅嵗北至日秀巖李心傳審定曽公序所藏賜本公序為京東帥之死難也博士錢堇諡曰剛愍執政慊之改曰威論漢魏法書後此者東晉為第一就晉人論之右軍又為第一右軍遺墨流傳至國初者尚數十紙而蘭亭臨本特為士大夫所稱豫嘗見壽翁所藏蘭亭石刻凡十餘而此最後出蓋曽魯公家故物也定本始見集古録中後六十年乃歸御府魯公所藏豈其居揆席時與歐陽公俱得之耶或謂右軍風流人物與謝太傅自是輩流不應專以筆札之工為貴豫謂有如此人作如此字乃為第一宜夀翁寶藏而無斁也淳祐橫艾攝提格皋月幾望霅濱病叟李心傳書曽魯公所藏本定刻得薛氏父子而顯觀道祖臨帖殊可賞愛豈心誠求之之故蘭亭自入渠筆端耶如未能然匠意經營終不近爾帖藏下山已久今乃入於禦溪歐陽公謂物常聚於所好者是也淳祐二年孟秋九日霅濱病叟李心傳題薛修撰道祖臨寫本此榮氏賜本真定刻也但次新謂慶厯中宋景文帥定武得此石留於公帑則小誤景文鎮中山在皇祐中墓碑可考建炎初宗元帥守汴都得此刻致之維揚行在渡江時失之自是絶迹豫嘗讀洪丞相𨽻釋云碑刻不必問所從但以書之工拙為斷此帖既佳而其來復有自非夀翁篤好之未易致也淳祐二年八月庚午霅濱病叟李心傳書榮次新所題賜本王順伯好古博雅在二熙間為第一所藏諸禊帖尤遂初極稱之袁起巖所賦兹其一也賞音本在筆墨外何必此優而彼劣其然耶其未必然耶夀翁試評之淳祐壬寅嵗秋八月哉生明霅濱病叟李心傳書袁起巖賦長篇王順伯所藏本夀翁以此軸示豫石既中斷故缺十六字字亦瘦徑榮次新所謂第三本也康生朔南遍厯至乾道間尚存此帖未知何時歸卞山今又易主蓋余行四方所未見者兹為可貴也淳祐次年尤集攝提格旻天中月皇極之日霅濱病叟題葉石林所藏定武斷石本王右丞所畫蘭亭圖祐陵標題仍書何延之所作記於後逮今百三十三年矣爰自火龍騎日以來天上圖書散落人間不知其幾其至江左者僅毫芒耳臣松得之以示臣龔攬流涕記中數字殆是筆誤讀者以意屬焉可也王圖已經睿鑒故不復論淳祐二年白露節日前史官臣李心傳謹記徽皇御題王維蘭亭圖又御書何延之蘭亭祕府藏祐陵書百餘軸臣三入承明備見之矣大抵政宣間所賜臣下觀筆也紹興日厯載高廟聖語云近有進先帝御扎者宸翰小璽皆人偽為之時渡江未久也而贋本已出矣何耶淳祐癸卯二月幾望臣松以帖示臣龔攬再三筆勢似與祕府所藏稍異因憶蔡絛史補政和初宰臣言近降御筆有不類上書者上曰比得一二製筆其管如玉而鋒長幾二寸是以用之作字軟美乃知崇觀政宣筆法固已不類此帖殆崇觀間所作也帖中領悟惓三字咸從右軍之舊不復釐正蓋自來臨摹之本如此惟麗字特有所避故與諸本不同云前史官臣李心傳龔書徽皇御書臨寫絹本蘭亭續考卷二
