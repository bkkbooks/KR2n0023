body:
  text: 蘭亭續考卷一宋俞松撰繭紙鼠鬚真蹟不復可見惟定武石本典刑具在展玩無不滿人意此帖所宜寳也右紹興癸丑歳髙皇帝賜鄭諶本有御筆復古殿書四字下用御書之寳藏俞松家李秀巖有跋在後世傳太史箴大雅吟黄庭經樂毅論遺教經蘭亭記皆逸少竒蹟而太史箴大雅吟不復傳黄庭雖有本然殊不類似後世依倣而託之者遺教經又訛缺過半獨樂毅論字完正精勁絶出此本藏於毘陵髙氏云始得之石城已亡其一角所存三百餘字即其真也其後或見其石者以為𤣥玉高氏子弟以火試之今遂破為數段石蓋楚石堅瑩似玉而畏火予亦甞見之然物之不幸有如此者亦可嗟也蘭亭記傳者尤多行草不一竟未見其正本嘉祐中侍官陳留得集賢胡公謹家本觀之與世之傳者不相類而字勢竒絶非後人所能為然予不知公謹果何從得之也治平乙巳予歸毘陵又獲瑯琊模本而字體乃與公謹所藏悉同其後有永陽守杜符卿題云蘭亭記自永嘉之亂而亡其石刻今存於定武李氏李氏初亦不甚秘而今無能見之者唯府帥下教或得墨本一二而已於是予乃知公謹所藏蓋定武李氏本也杜守真可謂好事者然其傳模非良工僅存梗槩而失其精神逺矣聊識而藏之然不知異日果能得李氏正本否四月壬辰南陽子厚題於山軒南齋杜守云蘭亭記永嘉之亂亡其石而張彦逺書斷云右軍修禊事時三十三嵗揮毫製序於時寳之貞觀中入於内府文皇帝令搨書人趙模韓道政馮承素諸葛貞等四人各搨數本以賜皇太子諸王近臣後以玉匣盛貯隨葬於昭陵然永嘉之亂乃是惠帝惠帝蒙塵辛未嵗至穆帝永和癸丑嵗相去四十二年豈非傳之誤耶因誌於此用祛羣惑耳治平乙巳中元日閑閑堂記右魯子學本後歸沈虞卿蘭亭樂毅東方先生三帖皆妙絶然摸冩屢傳猶有昔人用筆意思比之遺教經則有間矣元豐上巳日冩東坡䟦官本法帖蘭亭叙世間本極多惟定武本者最佳且有東坡先生跋證可為雙寳張氏其珍藏之辛未孟春中休日賀方回云此蘭亭乃定本也今亦罕有賞歎無已元祐辛未仲春十八日田晝楊書思趙滂始鄒正言浩赴貶所其友人告之曰使君官京師遇寒疾不汗五日死矣獨嶺海之外能死人哉友為誰田晝是也蘭亭佳無説蘓子瞻賀方回人所共識由田君求楊趙又從可知也淳祐四年夏至日長樂潘牥右一本自東坡而下四䟦藏俞松家劉郎無物可縈心沉迷蠧縑與斷簡求新不獲狂時發自謂下取且謾眼猗嗟斯人今實尠我欲從之官有限何時大呌劉子前跽閲墨皇三復返右米元章題劉涇所収唐絹本永和九年暮春月内史山隂幽興發羣賢題咏無足珍叙引抽毫取竒扎好之寫來終不如神助留為後世法二十八行三百字摸冩雖多誰定似昭陵竟發不知歸尚有異形終可秘彦逺記摸不記楮要錄班班有名氏後生有得苦求高俗説紛紛那有是右米元章題永徽中撫本予為兒童侍先君旁嘗聞與客論蘭亭詩叙惟取定武本為最真予初不悟此説今老矣學書無所成信知蘭亭詩叙不可以水墨積習也此軸廼侍郎王彦昭文房物觀之使人健羡是尤可珍也丹陽蔡肇天啓題右李鳳山所藏本先君所藏定本修禊叙愛之甚切今觀此刻宜在季孟之間紹興九年嵗次己未春三吴呉説䟦右王岐公本藏俞松家錢及之於工部外郎薛伯常所藏蘭亭曰蘭亭自唐太宗刋在玉石後流落定武民間世以定本為貴伯常尊君道祖世以米薛名者侍其先樞宻守定武别以玉石刋一本易民間太宗以歸薛道祖長安人也自此天下以長安薛家本為貴道祖又留刋一石在使宇留刋一石在譙門計之民間所易者一石只定武自有三本然皆經道祖手元用太宗碑本便上石皆善本也及之與伯常㳺數於其家參之曲折精㣲得蘭亭妙處一開不能逃也雋道此本真薛家好本也然伯常又說玉石本惟背後有五色蓮花記者為貞觀時本耳此石後來亦不在長安薛家葢道祖死其弟尚書嗣昌奏之宣和之間已取歸汴京龕在宣和殿上靖康丁未燕人載歸沙漠嗚呼中國所存者亦可知矣雋道妙于翰墨方能珍玩之他人有之未必能披玩法書如此也道祖諱紹彭其㓜子伯常諱經紹興二十八年八月十三日錢及之中叟謹書右藏俞松家王羲之蘭亭叙詩真蹟貞觀中御史蕭翼就會稽僧得之詔内供奉摹冩賜功臣時禇遂良在定武再摸於石真蹟復入昭陵世不復見自唐以來所傳惟寳定武本當時印取已多缺去㑹字此石宣和間又歸内府亦不復見矣今古摹刻響搨奚翅數十百卒非識者眼中物按張彦逺書法要錄云羲之復書此叙凡三十終不類初以是知無心之妙亦不自知也能造此理可以學道僑寓南安觀知白所藏定武真本旅愁頓解建炎二年五月二十六日宋唐卿謹識右藏越僧處王性之家蘭亭云是唐人所臨後有建中押尾建中乃李西臺名也以予觀之落筆結字皆是西臺法度此帖為西臺所摸者無復疑焉陳長方齋之書於唯室之東雲巢右李西臺臨本藏俞松家翰墨風流冠古今鵞池誰不賞山隂此書雖向昭陵朽刻石猶能直萬金右藏俞松家昭陵一入見無從鐫石猶將贋本供八法典刑今在此華山天外立三峰不須苦恨厭家雞自是鹽車後月題弄筆數行書紙背莫教人喚庾安西此甥此舅兩風流翰墨相傳不誤投大似曺溪付衣鉢臨池他日㸔銀鈎吾友胡少明教官以王文正家所得蘭亭叙惠其甥王立之定武石刻屢經牧守私易此本信非近年摹搨失真者所能髣髴也紹興乙夘上元日閩人陳長方齋之題於笠澤寓舍庚申二月復借此本叅訂程光祿滕康樞宻家所得本此石實與滕氏所藏同出一轍栁子厚殷賢戯批書後寄劉連州并示孟崙二童家有右軍書每紙背庾翼題云王㑹稽六紙二月三十日右三詩三題並陳齋之筆王沂公本李秀巖有跋藏俞松家平生三見唐人摸本蘭亭叙一見泗南山杜氏本刻者一是周延雋家本一是蘇中書家唯蘇氏本冠諸家其傳摸不失真處决非定武石刻所能及然不善為斵血指汗顔摸書手未免有之右陳齋之評唐人摸本定武舊刻長安薛氏所藏余政和丁酉歳倅郡次年移南陽薛氏子晐以此贈行建炎已酉承乏鄉部遭里中之變已失復得錢塘吴説傳朋題傳朋赴鎮上饒相遇嘉興觀定武舊本蘭亭真氣凛然紹興中甲子九月十四日雒陽朱敦儒題揆家所藏定武禊帖有三最後得此本絶妙戊申九月三日觀於欣遇東齋沈虞卿題是嵗冬十一月觀楊伯時路分家藏本與此正同其籖題是薛紹彭手書知此為定武真刻無疑沈虞卿再題蘭亭叙唐世摹本已不復見今但石本耳摹手刻工各有精粗故等差不同惟自定武者筆意彷彿尚存士大夫通知貴重皆欲以所藏者當之而未必皆然觀此本則不容聲矣紹興辛亥立冬石湖范成大書余從士大夫家見蘭亭石刻多矣皆號定武本雖秘府之藏亦未免雜贋也紹定癸巳修稧之月舟過采興欣遇沈公之孫寺丞出示家世所藏二軸望之知其為真也此軸本吴傳朋得諸薛氏而博古如尤王善書如朱范同所鑒賞則又信而有徵矣近歳士人作蘭亭攷凡數萬言名流品題登載略盡惜無以此軸示之陵陽李心傳書右一本六跋沈伯愚所藏本唐太宗既獲蘭亭叙乃命馮承素趙模諸葛貞之流鈎摸以賜近侍令禇遂良撿校而董之今嗜古好竒君子尚有秘傳當日賜本近見一本已歸御府矣神物䕶持斯為萬世不朽之藏廣宇間石刻莫可勝紀悉以定武為最善此蓋是也紹興十九年九月十五日懶拙老人米元暉書宣和之末復置書學增博士三員杜從古米友仁與兢昨兼見任職事一日太上徽皇各賜蘭亭叙石刻一本其下御筆書云康定二年進尚是定州所貢今觀是本政與向來所賜同今不易得宜珍秘之紹興壬申春二月六日保大騎省雲來徐兢題定本蘭亭叙如世竒寳不惟難得亦難辨此蓋故家所藏米徐二公好古博雅與之不疑僕因而識焉幸矣淳熙辛丑閏月晦日唐季度題右一本三䟦藏俞松家蘭亭禊飲叙草號右軍法書第一真墨入昭陵虞禇軰所臨典刑猶在散落人間今復數百年鈎搨既多真贋轉襍濃輙過肥􅊏或病瘦偏勁露鋒規媚傷弱工不勝拙當時無復見右軍大成矣余每獲蘭亭隨以入集晚㳺都下蘭若得本于老書生云清獻趙公少年學書定武本一見驚喜取較他本果勝不誣遂以壓卷魯直嘗䟦蘭亭有云摹冩或失真肥瘦亦自成妍媸各以心㑹其妙䖏因題所集云蘭亭㑹妙紹興辛巳元夕後一日魯長卿書右藏魯子平家蘭亭為書法之祖南中摸倣幾數十本終不若定武者之勝今觀此軸刻畫與使墨皆有佳趣决知其為定武者也然較之予所収者墨色匀重亦打碑者自有不同得之者當寳藏盖書法盡於此矣石湖居士書右范至能跋右蘭亭記曾禹任得之諫大夫毛氏毛氏得之淮隂非近時習訛者也予見元明䟦山谷書云山谷謫黔泝峡舟中日日惟把玩石刻一紙盖此記也故末嵗筆法超絶云予聞五更侵早起更有夜行人願持此句子寄聲山谷楊萬里右楊誠齋跋曾氏本晉人風度不凡於書亦然右軍又晉人之龍鳳也觀其鋒藏勢逸如萬兵銜枚申令素定摧堅䧟陣初不勞力蓋胸中本無所滯礙故形於外者乃爾非但積學可致也昔梁昭明以一語不中廢此叙而不錄後世以絲竹管絃為重複之病至齊梁小兒偽妄之作則信而不疑是蓋微瑕棄玉而以玉表重珉唐太宗親傳晉史偹載斯文豈無意耶雖然翰墨如此閱千百載終當輝映學海後之覧者亦將有感于此固右軍期望於大夫士之志也故我樂為仲威言之紹興乙亥九月二十七日必大書朝士素藏金石刻且殫見洽聞者莫如沈虞卿尤延之王順伯予每咨問焉淳熈己酉正月五日必大題唐太宗始得修禊叙命趙模韓道政馮承素諸葛貞搨本賜羣臣而虞世南歐陽詢禇遂良各自臨摹由是流傳人間今高宗皇帝臨定武石本則唐摹本亦亡矣皇諸孫臣善鏬好古博雅得紹興宸奎寳藏之屬臣必大記其後必大嘗伏讀御製御書翰墨志近三千言而稱美此序無慮數四既曰測之益深擬之益嚴姿態横生莫造其原又曰得右軍書手之不置自束髪喜作字晚年得趣又曰右軍擇毫製序用蠶繭紙鼠鬚筆遒媚勁健絶代更無凡三百二十四字有重者皆具别體之字二十絶無同者厯代論書遂集大成方孝宗皇帝在王邸詔摹冩為具課乃知二聖心畫雖曰天縱亦積學之功也使羲之復生将云非恨陛下無臣法恨臣無陛下法耶嘉泰二年三月三日少傅觀文殿大學士致仕益國公周必大謹書右三跋周益公題定武本凡湍流帶右天五字全者皆謂在薛紹彭之前然不能知嵗月之乆近此誠善本王順伯謂是熙寜前摹拓於中山者為可寳近見畢少董所董氏淳化間本尤為精好自言為兒時親在定武見青石本帶右天三字已缺壊大觀再見之與舊所見無異則五字未必皆紹彭劖損也更當考紹彭在中山時嵗月云樓大防跋王伯常本薛道祖名紹彭向之子也與米元章劉巨濟相為莫逆之友不惟人物翰墨相上下所蓄法書名書亦略相埒今有清閟堂帖名字印章瞭然跋語所謂河東公者也從孫棣近以伯父揚州所藏稧序問清閟為誰誦所聞以告之樓大防䟦清閟居士本子耕明逺以古帖相易不肯各以其寳余有淳化間本與此相似而流帶右天尚全謂子耕曰天下有道丘不與易也明逺姓單名丙文右選之有文者樓大防跋黄子耕本右三跋樓攻愧題南朝千載有斯人帖出蘭亭花草春俛仰之間已陳跡至今此紙尚如新右楊誠齋題袁起巖本慶厯中宋景文帥定武有舉子攜此石至都死於營妓家有營吏號孟水清者見而識之取獻景文景文喜甚不敢私有留於公帑世謂之定武本後薛道祖攜以歸長安宣和中有㫖取舊石置睿思殿嘗以墨本令賜近臣時先君通籍殿中遂得此本間關兵火之餘迨今數十年秘藏不墜豈有物之䕶持因書所聞以告來者淳熈十年八月二十三日東平榮芑書定武蘭亭叙凡三本其一李學究本傳為智永所摸薛氏别刻本易以歸長安宣和間歸御府前本是也其二字肥有薛道祖别刻留定武與前本方駕人多課為舊本非也其三斷字差瘦得于修城役夫後藏康伯可家舊刻與岐陽石鼔俱載以北宋元功云嘗從北使聞在中原楊伯時云與薛氏為姻家定武本以玉石背刻舒元輿牡丹賦并記之以廣異聞淳熈十三年五月十三日右東平榮芑題右榮次新二䟦桑澤卿考中已載其間三斷石本今藏俞松家李秀巖題跋在後蘭亭皆以定武為貴其寔有三各不同始慶厯中宋景文為帥得唐石本匣藏庫中至元豐中薛居正為帥惡摹打聲乃刻别本置譙樓未㡬其子紹彭又别刻易元石歸長安蓋道祖嗜古工書臨摹盡善三本皆出定武而宋之所得者當謂之唐石本薛氏父子所刋者即謂之定武本可也大觀既詔取元易石本龕置宣和殿靖康時與岐陽石鼓共載以北南渡以來舊物多不存後人所在摹刻不知幾本觀之者有肥瘦劖損取况之說紛紛不一皆未足為證多取他本較出自然萬萬不侔余亦嘗以後來所見参攷兼見楊誠齋所藏薛道祖籖題本與此無纎毫異故知此本為定武毋疑淳熈丁未仲冬後一日山隂王明清題右玉照王仲言所題本定武蘭亭叙熙寕中薛師正為帥其子紹彭竊歸洛陽斷損湍流帶右天數字以惑人宣和間歸御府建炎初宗澤送之維揚迨經兵火之餘不知所在此本未斷損乃舊日定武所拓尤可貴重黄太史謂肥不剰肉瘦不露骨評此帖也臨川王厚之䟦前軰論定武蘭亭石本風流秀潤骨肉相稱視其筆意右軍清真氣韻冠映一代猶可想見今觀此帖寜不信然己未冬武夷詹體仁書永和嵗癸丑羣賢㑹蘭亭流觴各賦詩風流見丹青右軍草褉叙文采燦日星選文乃見遺至今恨昭明字畫冣得意自言勝平生七傳至永師襲藏過金籝辨才尤秘重名已徹天庭屢詔不肯獻託官堕戎兵妙選蕭御史微服山隂行譎詭盡萬狀徑取歸神京辨才恍如失何異勑六丁文皇好已甚丁寜殉昭陵當時馮趙軰臨冩賜公卿惟此定武本謂出歐率更採擇獨稱善遂以鐫瑶瓊流傳迨五季皆在御寢扄耶律殘石晉睥睨不知名意必希世寳氊裹載輜軿契丹既北去棄與朽壤并乆乃遇知者龕置太守㕔或云政宣間此石歸紹彭又言入内府宣取恐違程焚膏繼短晷拓本手不停疊紙至三四肥瘠遂異形南渡愈難見得者輙相矜我見十數本對之心欲醒汪侯端明子嗜古自弱齡錦囊荷傾倒快覩喜失聲帶流及右天徃徃字不成而此獨全好䕶持如有靈尤王號博雅異論誰與評硬黄極摹冩唐人苦無稱贗本滿東南𤨏𤨏不足呈猶有婺與撫碔砆近璜珩右軍再三作已覺不稱情心摹且手追安能效筆精響搨固近似形似神不清不如恭其意到手隨縱横况我筆素拙何由望羣英近亦得舊物庶幾窺典刑此本更高勝著語安敢輕孤風邈難繼悵望冥鴻征攻愧題季路本悵望當時真蹟臨摹所在支分千載但稱合作誰能有感斯文定本為世第一此又在定武前今日錦標玉軸向來不直一錢攻愧題袁起巖本東㳺登㑹稽祗見蘭亭不見碑北過中山府欲訪此碑不知處間從故家看墨本如此二者絶難遇曾經耶律氊裹去至今邉徼猶知慕時将一二餽北使持歸徃徃快先覩未知玉石真在否要比江南終近古他日縛取呼韓作編戸勒銘歸來過定武只問君王乞此碑打向人間莫論數攻愧題羅春伯本余三為蘭亭作詩姚江施令尹家世好古所藏定武畧與季路者相似披玩不已欣然為題其後四明樓鑰慶元戊午詹阜民子南趙師夏致道武子以是日修故事於此地武子出示同觀相望八百四十有六年矣懷想風流為之慨然觀蘭亭當如禪宗勘辨入門便了若待渠開口堪作什麽識者一開卷已見精粗或者推求㸃畫叅以耳鑑瞞俗人則可但恐王内史不肯耳予平生見佳本亦多然如武子所藏不過三四真可寳也慶元庚申重九月笠澤陸㳺書莆人陳讜正仲借觀於越上齊宫是本真定武二三百年前本也冝珍藏之嘉㤗元年八月初八日嘉泰元年八月上休日南豐曽㬇茂昭觀於越之棣華堂常叔度徐淵子同觀于西渤張園壬戌四月二十四日是日微風小雨嘉泰壬戌冬至後五日林成季周南朱鼐趙汝譡朱元紘滕􅍲别旴昭施武子於虎丘同觀書畫武子弟寅宏徃見定武蘭亭後有畢少董所題與此正同真竒物也甲子七月二十有三日闗中張嗣古敏則曩年沈揆虞卿蓄蘭亭叙刻凡百餘本予嘗見之要各有所長而以定武刻為冠予問沈何以别其為定武本沈以斷損湍流帶右天字為騐今觀王順伯䟦云未斷損前本尤可貴重則是沈之前説尚未盡也以是知見聞不可不博開禧丁夘正月望題倪正甫李􅐉真徳秀任希夷同觀嘉定癸酉中冬二十五日玻瓈泉上題定武禊叙有三曰肥曰瘦曰五字損本予皆舊藏焉今又得此肥本於施武子因以識之戊寅重九日古汴向水若氷甫右不損本自王順伯而下十三䟦藏俞松家鄱陽洪景盧梁溪尤延之東平范東叔括蒼梁昭逺三山黄彛卿丹丘謝子長延平鄧千里長樂黄邕父霅川倪正甫淳熈丁未孟夏六日觀於羣玉亭秘書省印括蒼王誠之将命出使三館之士餞於史退傳北園檇李沈虞卿出此書示坐客同觀者凡十四人鄱陽洪景盧述錫山尤袤延之三山高子雲曇無諸黄倫彛卿山隂莫叔光仲謙蜀花仲藝東卿括蒼王信誠之延平鄧馹千里濟陽李巘獻之長樂黄唐邕父渠江正叔簡敬父吳興倪思正甫臨江羅㸃春伯右一本兩經題名藏俞松家李秀巖題跋在後上即大位之初揆以國子祭酒召入都越旬日被命使燕過定武得此本然非舊刻也顧修程萬里犯暑馳驅而歸槖有此亦可喜也後三年來守吴門遂以頃嵗所得别本裝為一卷北望故都囘思經行之地撫卷慨然因書於卷後紹熙壬子仲冬四日揆題右蘭亭修禊叙劉餗嘉話云蘭亭叙梁亂出在外陳大嘉中僧智永得之隋平陳或以獻晋王即煬帝也僧智果借搨不從索果死歸弟子辨才唐太宗為秦王時見摸本喜甚使歐陽詢求之以武徳二年入秦王府正觀中搨十本賜近臣世言遣蕭翼詭計取之者妄也後遂入昭陵温韜發唐諸陵蘭亭復出人間世所傳摸刻本極多而獨貴定武本者自山谷始所謂彷彿存古人筆意者是已此刻是定武舊本慶厯中韓魏公守定武有李學究者得此刻魏公力求之仍埋石土中刻别本以獻李死其子稍稍摹以售人宋景文為帥伶人孟水清得之以獻子京子京愛而不敢有留於公帑元豐中薛師正樞宻為帥擕石去其子紹彭道祖刻别本在郡大觀中次子嗣昌始納之御府龕於宣和殿後與岐陽石鼔俱載以北或云道祖於定武舊本劖去湍流帶右天五字以惑人或云道祖刻别本劖去此五字未知孰是尤延之云此舊本葢道祖未劖去之前摹拓者尤可愛重也延之平生所見禊帖不一其言當可信檇李沈揆謹題右二本沈虞卿題歐公所得蘭亭凡三其一得於王沂公家此本是也揆為大學正時同舍生章澥為予得之其族人家今二十有一年矣撫卷感慨豈惟山隂勝㳺成陳迹而已哉紹熈癸丑正月十日書於姑蘓郡齋右藏俞松家李秀巖題跋在後唐硬黄紙䨇鈎蘭亭叙字皆率意為之咸有禇去非馮承素之流所搨冩本無復可疑此書當下真蹟一等非知書者未易道也昔南宫米舍人芾元章書史有云樂毅論天下正書第一蘭亭叙行書第一也縫有半書印乃米氏寳晉書印後有忠孝家之印即吴越錢氏印及有趙景道進徳齋印盖已經名公鉅卿賞鑒矣乾道二年中元前一日獲於錢塘故人杜可升升之因手裝於行在祥符寺張堯臣跋信以傳信疑以傳疑事物皆然而字畫為尤甚世之法書亘古迄今王逸少為稱首永以為訓不可復加然精粗真偽在當時或已有疑者逸少常作意書表上穆帝帝使張翼擇紙色長短相類者臨冩而題後答之逸少初亦不覺詳視乃歎曰小兒亂真廼爾耶在當時已自疑如此唐初去永和猶未逺相傳以叙草為遺踪之冠太宗寤寐求之以王氏家傳在其孫智永弟子辨才處房𤣥齡計得之及攷紀聞所載乃云元草為隋末時五一僧所藏誓與死守太宗以威驅勢脅而又得之二説不同則此叙真蹟乂有可疑如此自匣殉之後獲見硬黄響搨者且為欣幸迨於明皇始刋之於學士院洎顯宗朝又刋於翰林待詔所攷其二石一乃懷仁所臨前瘦而後肥一乃王承規摸刻豐殺得所轉搨精神至石晉時耶律輦藏北去遺是石於殺狐林遂號為定武本亦不知其為學士院本耶或待詔所本也後汴京書坊亦刋一石咄咄逼近而摹手差劣識者謂之贋本時人鮮克攻發而墨本滋為可疑宣政初薛紹彭易定武石歸藏於家敲刷過多駸駸剥裂上之天府更以他石别鐫其致疑滋甚二百年間博雅君子家摹而戸刻之無不根苗於定武本其庸工者駁雜不能致辨而精微者得真十六七互相詆訾而収藏者為疑又将如何自非得之之正傳之之的雖明發秋毫欲决其近似之惑亦戞乎其難哉雙槐先祖政和間為博士日得是本於定守之故家携歸秘箧示為子孫矜式淳熈中􅍐入伯父位愛䕶惟謹近為鬻碑者所得不期而遇若有神明呵禁之者价驚喜之餘亟以倍價復歸較之所集蘭畹數十本何啻驪珠之與魚目瑜瑾之與碔砆筆勢自然精微遒勁玩味不能釋手信乎其為王承規舊本也因騐諸易得卦之暌象曰上火下澤暌君子以同而異蓋始焉同於槐堂而中也異于分析初九曰悔亡勿追自復蓋幾為鬻倅負之而走幸終歸於我上九乃曰羣疑亡也蓋家傳之可信而絶無前所謂數者之疑吁合極而暌暌極而合至理所存非偶然者謹薫沐装軸永為青氊之藏抑當思其信以守之誼則其傳斯無忝耳嘉定己巳中秋鄭价裕齋誌右二本二䟦鄭雙槐本藏俞松家蘭亭博議余及桑君澤卿所輯也余挈故書入山隂結廬茂林修竹間訪問王謝諸人遺躅但見壑流巖秀雲物興蔚而已既而於屋東得鄰土地數畝益藝卉竹治堂觀人有以汪龍溪家所藏禊圖見遺者乃掲之屋壁間又有舊藏定武石刻亦設諸几席日與兒軰來㳺觀圖玩字如與王謝諸人相接一日澤卿忽擕博議見過予驚且嘆曰此越故事也我曾不能為之而澤卿所編甚勤且篤而又精贍貫串如此余每謂右軍召為侍中尚書皆不拜又擢䕶軍將軍仍不就至於兒娶女嫁便有尚子平之意縷縷書辭間其識宇度量似非江左諸傳所可及天若有晉使昌於事業當不在司徒叔太傳公之下而論者僅推其研精篆素盡善盡羙而已吁是何其不知右軍者耶繭紙一帖辨者多矣自有確論因不復云獨愛我澤卿續證詩書之系膏肓大雅之傳凡所攷訪一一詳的直有括囊流俗包舉藝文編該緗素殫極丘墳之意因以叙博議且以䇿衆曹之苟簡鮮工云開禧元年十二月望日四明髙文虎書右藏楊叔憲家嘉泰壬戌十二月因與鄰人湯升伯過童道人許見此禊帖知是烏䑓盧提㸃者所藏定武舊本後數日雪後更欲雪上車寒凛因詣童買得之姜堯章書廿餘年習蘭亭皆無㑹處今夕燈下觀之頗有所得澷書於此癸亥三月十二日白石道人天下能事無有極其至者袁昻謂王右軍字勢雄强龍跳天門虎卧鳳闕厯代寳之永以為訓然右軍在時師法平南王廙又衛夫人書大雅吟賜子敬右軍亦嘗臨學同時有荀輿字長倩冩狸骨帖右軍自謂不及也大抵右軍書成西漢魏西晉之法盡廢右軍固新竒可喜而古法之廢寔始右軍亦可恨也余官帖中有張芝章草帖皇象文武帖鍾繇宣示帖王世將廙上表二首其筆高絶具存古意而宣示帖乃右軍所臨不失鍾法也右軍之前既多名書右軍同時又有世将李衛王洽謝安珉珣諸人皆妙于此故蘭亭不見稱於晉而至隋唐始顯耳癸亥六月九日白石書是日天乃大熱右一本姜堯章三次題䟦藏俞松家李秀巖有跋在後蘭亭出諸唐名手所臨固應不同然其下筆皆有畦町可㝷惟定武本鋒藏畫勁筆端巧妙䖏終身効之而不能得其彷彿世謂此本乃歐陽率更所臨予謂不然歐書寒峭一律豈能如此八靣變化也此本必是真蹟上摹出無疑學右軍書者至蘭亭止矣今一所傳石本刓一角者皆定武所自出也然其工拙姸醜如人靣之不同覧者自當具眼可耳又定武一石前軰紛紛各有異論既自具眼定不向人言下轉也此卷有山谷題字山谷之言云爾乃知當時真贋混淆乆矣山谷之孫字子邁今為農丞過予見後題欲乞去予不忍與以為去此題則蘭亭廢矣周翰者文及甫之字多見其名於書帖後雅尚如許亦足以贖粉昆之疵矣嘉泰壬戌十有二月白石道人姜夔堯章書右蕭千巖所藏本余㓜侍先君見薛氏子為先君道定武修禊叙刻頗詳薛之伯祖師政嘗帥定武謂初得此刻于定武之殺狐林後置郡𪠘嵗月乆矣薛至定士大夫乞墨本者狎至薛惡摹打有聲自刋别本留譙樓下多持此以授覔者蓋先後已二刻居亡何薛之子紹彭私又摹刻别本易元本以歸自是定武所藏殆薛父子所重刻二本耳政非舊物也然好事稽究源流次第真贋各據所聞以定勝否年來有劖本之說謂薛師政所得之本欲以自别乃取湍流帶右天五字各劖一二筆私以為記又有取况之說謂定武者於仰字如針眼殊字如蟹爪列字如丁形紛紛之論莫知孰是然予獨信薛者盖其家親見而身厯之豈今所謂定武本者或出於薛氏父子所重刋者耶抑所挟歸者中更多故將又轉而之他也今觀順伯所藏余亦未敢遽以薛語劖本取况之說為證然在等軰實稱第一余雖隨羣嗜此所蓄益未敢信是夫以右軍平生得意書一字一筆皆足以心㑹而神遇要不必苦計較毫釐疑似之間余自此更當訪佳本以求正于順伯云袁起巖題王順伯少卿本頃嵗有薛氏子為先君道其族伯紹彭定武蘭亭帖三本始末語與前軰略同去春予䟦王順伯定武本嘗及之矣蘭亭帖距今嵗月滋乆本既弗一好事者説乂紛異然物之珍謬雖相去毫釐吾人一具眼目少加訂正便可盡見如順伯與今季路所藏一見知為至寳物也以肥瘦别定本先後本亦是要論予留都下九年士大夫家所幸數見之徃徃筆瘦而刻畫大明者甚多較之肥本自永和九年而下只此一行其運筆自然氣象渾厚已不可及其間如㑹有咸流弦暢清可浪猶齊攬數字相去尤不勝天淵他皆如此又肥本字畫之傍石紋自然皴縐如䡖烟籠染抆拭未去之狀俗謂之粉紋此尤不可偽為前嵗見范元卿所藏渠却未深信肥本人固各有見也尤延之領袖博雅定武石本偶未得刮目嘗見沈虞卿之本似不减順伯季路者予雖隨羣嗜此而所儲未確僅有一二可以偹遺然必求有以頡頏于尤沈王汪之門可也袁起巖題汪季路大慱本富沙袁說友敬誦蘓富諸鉅公題䟦注想典刑如生乎其時也輙冒不韙書嵗月於下方袁起巖題唐人臨本永和九年暮春日蘭亭修禊羣賢集含毫欲下意已先媚日暄風佐揺筆當時一筆三百字但說斯文感今昔誰知己作尤物看流落人間天上得天高地逺閟不示僅許一二翻摹勒忽然飛上白雲俱徑入昭陵陪玉骨識真之士已絶少真者一去嘆難覔紛紛好事眼空眩只把殘碑摹真蹟蕭郎䄂去明真贋定武傳來方甲乙如丁如爪辨形似不豐不露分肥瘠人亡無復見風流謾費精神疲得失臨川先生天下士古貌古心成古癖搜竒日富老不厭如渇欲飲饑欲食牙籖不止三萬軸集古已多千卷帙有時瞥眼道旁見倒屣迎之如不及平生著意右軍䖏並蓄兼收一何力賞音本在筆墨外何必此優而彼劣清波萬頃渾一㸃明月一輪雲半入是中元不礙真趣氣象典刑尤歴厯知我罪我春秋乎政爾未容言語直我方隨羣厚其嗜門戸弗强纔僅立幾年冥搜政無那剰欲流涎分半席閱公善本三四五不覺長歌書卷側羲之死矣空費公家九萬牋要得斯人冩金石右三䟦一詩袁起巖題内所題王順伯詩本藏俞松家李秀巖有跋在後予甞觀歐陽文忠公題是書是知真本已葬昭陵唐末之亂昭陵為温韜所發其所藏書畫皆剔取其金玉而委棄之於是魏晉以來諸賢墨跡復流落于人間我宋太宗皇帝購募所得集為十卷俾摸傳之時以分賜近臣今公卿家所有淳化法帖是也獨蘭亭真本亡矣自唐以來傳本雖多皆以所藏舊本轉相摸傳失真彌甚而皆以不同間或得其一二耳此本光朝頃得之于表兄羅山宰王敬子蓋其奉使北庭歸以為贈藏之踰三十年矣嘗以諸本校其優劣獨此為冠今所謂定武本者是也故特寳之以為楷式因知傳刻者尚爾造妙想其真跡宜何如哉嘉定十六年嵗在癸未六月望日樂静居士永城劉光朝明逺跋右藏俞松家禊帖至唐乃有湯普徹趙模韓道政馮承素搨本皆不如永禅師禇河南所臨唯栁誠懸自用栁法作大字雋竒特甚今工部公所書生氣凛凛儼然魯公栁莫及也公在髙宗䑓閣孝宗省曺名節論議彛獻典刑皆足以標凖兩朝儀刑諸老而一本諸學晚來東䑓訪舊事風流聲采猶被晉人士清哉孫踐世官拜遺像清白雅亮挺挺祖風顧瞻棠䕃遺越以琰一香世世如彼渚蘭乃若裒上祖以來書導自羲獻二十八人直可陋視方慶嘉定十二年八月日高似孫書右高踈寮題喻工部樗所冩禊序之茂為兒童時侍先祖龍舒府君常見几間卷舒蘭亭㑹妙喜動顔色抱之茂于膝上指示且曰此王右軍蘭亭修禊序草也筆意精妙於時寳之劉餗蘭亭嘉話云蘭亭叙自梁亂出在外陳天嘉中僧智永借得之隋平陳或以獻諸晉王即煬帝也僧智果借搨不還後果死歸弟子辨才唐太宗為秦王時見摸本喜甚使歐陽詢求之武徳二年入秦王府貞觀中搨十本賜近臣世言蕭翼取者妄也後遂入昭陵温韜之亂發唐諸陵蘭亭復出人間世所傳摹刻本極多而今獨以定武為貴者自山谷始所謂彷彿存古人筆意者是也慶厯中韓魏公守定武有李學究者得此刻魏公力求之廼埋石土中别刻本以獻李死其子稍稍摹以售人宋景文為帥伶人孟水清得之以獻子京子京愛而不敢有也留於公帑元豐中薛師正為帥擕石去其子紹彭道祖刻别本在郡大觀中次子嗣昌始納之御府龕於宣和殿後與岐陽石鼔俱載以北或云道祖别刻本劖去湍流帶右天五字又云劖去者别本也今此數本刻字皆全又云此皆未劖去之前摸本也傳刻既多工有巧拙自各存其妙然真蹟已千百年不可復見矣故題之曰蘭亭㑹妙之茂痛念先祖誨言時已七十年矣遺墨如新不覺感愴堕泪遂書於後右雪邨魯伯秀跋家藏本孫叔詣参政以所被賜本刻石㑹稽而薛嗣昌所得長安崔氏本亦刻在淛東倉司栁公權楷書禊序改天朗為天融不知何意右二說秀巖李先生筆記蘭亭續考卷一
